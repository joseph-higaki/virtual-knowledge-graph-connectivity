connector.name=iceberg
# Iceberg catalog backend = Nessie (mirrors the Ontop team's known-working
# ontop-trino-iceberg-playground; property names confirmed vs Trino 478 docs — do NOT hand-edit
# from memory, they are version-sensitive, CLAUDE.md). /api/v2 selects Nessie REST API v2; ref=main
# is Nessie's default branch. Nessie only tracks catalog pointers — the S3/warehouse config below is
# Trino's, not the Nessie server's.
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v2
iceberg.nessie-catalog.ref=main
iceberg.nessie-catalog.default-warehouse-dir=s3://warehouse
# Trino's native S3 file system (no Hadoop). path-style-access is required for MinIO.
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
# Injected via Trino's ${ENV:...} substitution (the trino service gets these from secrets/.env),
# so no credential sits in this tracked file — same pattern as Ontop's ONTOP_DB_* injection.
s3.aws-access-key=${ENV:AWS_ACCESS_KEY_ID}
s3.aws-secret-key=${ENV:AWS_SECRET_ACCESS_KEY}
