# Trino postgresql connector (rung 4): federates Postgres beside the iceberg catalog so one Ontop
# JDBC hits both. Catalog name = this filename = `postgresql`; the polyglot mapping addresses
# postgresql.public.*. Host `postgres` is the compose service name. Creds via ${ENV:...} from the
# trino service env (secrets/.env) so no password sits in this tracked file — same pattern as
# iceberg.properties' S3 keys. Present during a rung-3 re-run too, but only registered (lazy
# connect), so rung 3 stays green with Postgres down.
connector.name=postgresql
connection-url=jdbc:postgresql://postgres:5432/${ENV:POSTGRES_DB}
connection-user=${ENV:POSTGRES_USER}
connection-password=${ENV:POSTGRES_PASSWORD}
