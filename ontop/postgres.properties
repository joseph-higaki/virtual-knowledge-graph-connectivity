# Ontop -> PostgreSQL JDBC connection (rung 2 path; rung 0 exercises the gene subset).
# Credentials are NOT here: docker-compose injects ONTOP_DB_USER/ONTOP_DB_PASSWORD from
# secrets/.env at runtime, keeping the password in one gitignored place.
# The db name below must match POSTGRES_DB in secrets/.env.
jdbc.url=jdbc:postgresql://postgres:5432/hetionet
jdbc.driver=org.postgresql.Driver
