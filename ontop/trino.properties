# Ontop -> Trino JDBC (rungs 3 & 4). Shape mirrors the Ontop team's known-working
# trino_tpch.properties: the default catalog/schema rides in the URL, so mapping SQL resolves the
# iceberg.hetionet.* tables. Trino no-auth = any non-empty user, no password (creds are Trino's job
# at the S3 layer, not Ontop's). db name here must match the Iceberg schema created by load_iceberg.
jdbc.url=jdbc:trino://trino:8080/iceberg/hetionet
jdbc.driver=io.trino.jdbc.TrinoDriver
jdbc.user=trino
ontop.query.defaultTimeout=45
